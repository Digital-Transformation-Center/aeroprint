name: aeroprint-dev
version: '0.1'
summary: ROS 2 Talker/Listener Example
description: |
 This example launches a ROS 2 talker and listener.
 
confinement: devmode
base: core20
 
parts:
# This part installs the qt5 dependencies and a `desktop-launch` script to initialise
  # desktop-specific features such as fonts, themes and the XDG environment.
  # 
  # It is copied straight from the snapcraft desktop helpers project. Please periodically
  # check the source for updates and copy the changes.
  #    https://github.com/ubuntu/snapcraft-desktop-helpers/blob/master/snapcraft.yaml
  # 
  desktop-qt5:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: qt
    plugin: make
    make-parameters: ["FLAVOR=qt5"]
    build-packages:
      - build-essential
      - qtbase5-dev
      - dpkg-dev
    stage-packages:
      - libxkbcommon0
      - ttf-ubuntu-font-family
      - dmz-cursor-theme
      - light-themes
      - adwaita-icon-theme
      - gnome-themes-standard
      - shared-mime-info
      - libqt5gui5
      - libgdk-pixbuf2.0-0
      - libqt5svg5 # for loading icon themes which are svg
      - try: [appmenu-qt5] # not available on core18
      - locales-all
      - xdg-user-dirs
      - fcitx-frontend-qt5
      
  ros-demos:
    after: [desktop-qt5]
    plugin: colcon
  #  source: https://github.com/Digital-Transformation-Center/aeroprint.git
    source-branch: master
  #  source-subdir: demo_nodes_cpp
    source: .
    build-packages:
      - build-essential
      - cmake
      - python3-colcon-common-extensions
    stage-packages: 
      - ros-foxy-ros2launch
      - ros-foxy-demo-nodes-cpp
      - libxcb1
      - libx11-xcb1
      - libxrender1
      - libxi6
      - libfontconfig1
      - libfreetype6
      - libxext6
      - libxfixes3
      - libx11-6
      - libxcb-render0
      - libxcb-shape0
      - libxcb-shm0
    build-environment:
      - CMAKE_PREFIX_PATH: /snap/ros-foxy/current/opt/ros/foxy
    organize:
      # snap/gui/aeroprint-dev.desktop: usr/share/applications/aeroprint-dev.desktop
      src/host/host/example_gui.py: app/stinker
      snap/local/talker-wrapper.sh: usr/local/bin/talker-wrapper
      src: $SNAP/src
  copy-hostscript:
    plugin: dump
    source: snap/local
    organize:
      talker-wrapper.sh: usr/local/bin/talker-wrapper
    after: [ros-demos]
apps:
  # stinker:
  #   command: app/stinker
  #   # command: desktop-launch usr/local/bin/talker-wrapper
  #   extensions: [ros2-foxy]
  #   plugs:
  #     - network
  #     - network-bind
  #     - desktop
  #     - desktop-legacy
  #     - x11
  #     - wayland

  talker:
    command: opt/ros/foxy/bin/ros2 launch host host_launch.py
    extensions: [ros2-foxy]
    environment:
      # QT_QPA_PLATFORM: wayland
      LD_LIBRARY_PATH: "$LD_LIBRARY_PATH:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/blas:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/lapack"
      QT_QPA_PLATFORM_PLUGIN_PATH: $SNAP/usr/lib/x86_64-linux-gnu/qt5/plugins/platforms
    # desktop: ${SNAP}/meta/gui/aeroprint-dev.desktop
    plugs:
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - x11
      - wayland
    